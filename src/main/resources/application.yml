server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bishe?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

# 如果你准备用 MyBatis，就先不要启用 JPA 建表
# 建议删除 jpa 整块，避免和 MyBatis 混用导致理解混乱
# spring:
#   jpa:
#     hibernate:
#       ddl-auto: update
#     show-sql: true

logging:
  level:
    com.yushilong.bishe: debug

jwt:
  secret: "bishe-super-strong-jwt-secret-key-at-least-32-bytes-2026"
  expiration: 86400000

app:
  upload-dir: D:/bishe/bishe_uploads
  ai-url: http://localhost:8000/api/action/recognize